name: Backup diario a Google Drive

on:
  schedule:
    - cron: "0 3 * * *" # 00:00 Argentina (UTC-3)
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    environment: edefi
    steps:
      - name: "0 - Validar archivos locales (máx 4)"
        run: curl -fsS "${{ vars.API_URL }}/api/backup/validar-archivos-locales"

      - name: "1 - Generar backup BD en disco"
        run: curl -fsS "${{ vars.API_URL }}/api/backup/guardar-backup-bd-en-disco"

      - name: "2 - Generar backup imágenes en disco"
        run: curl -fsS "${{ vars.API_URL }}/api/backup/guardar-backup-imagenes-en-disco"

      - name: "3 - Rotar backups en Drive (borra el más viejo si hay 3 pares)"
        run: curl -fsS "${{ vars.API_URL }}/api/backup/rotar-backups-en-drive"

      - name: "4 - Subir backup BD a Drive"
        run: curl -fsS "${{ vars.API_URL }}/api/backup/subir-backup-bd-a-drive"

      - name: "5 - Subir backup imágenes a Drive"
        run: curl -fsS "${{ vars.API_URL }}/api/backup/subir-backup-imagenes-a-drive"

      - name: "6 - Limpiar backups locales"
        run: curl -fsS -X DELETE "${{ vars.API_URL }}/api/backup/limpiar-backups-locales"
